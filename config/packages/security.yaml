security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout

    access_control:
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/theme/$, roles: ROLE_ADMIN }
    - { path: ^/theme/new, roles: ROLE_ADMIN }
    - { path: ^/theme/\d+/edit, roles: ROLE_ADMIN }
    - { path: ^/subject/$, roles: ROLE_ADMIN }
    - { path: ^/subject/new, roles: ROLE_ADMIN }
    - { path: ^/subject/\d+/edit, roles: ROLE_ADMIN }
    - { path: ^/account, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10