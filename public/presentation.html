<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LovingLearn — Présentation</title>

    <!-- Open Graph : aperçu pour Discord, LinkedIn, WhatsApp, etc. -->
    <meta property="og:title" content="LovingLearn — Apprends en t'amusant 🚀">
    <meta property="og:description" content="Découvre LovingLearn, une plateforme éducative pour enfants — Espace, Dinosaures, Super-héros, Corps humain, et un jeu de mémoire !">
    <meta property="og:image" content="https://gugu42.alwaysdata.net/LovingLearn/videos/poster.jpg">
    <meta property="og:url" content="https://gugu42.alwaysdata.net/LovingLearn/presentation.html">
    <meta property="og:type" content="video.other">
    <meta property="og:video" content="https://gugu42.alwaysdata.net/LovingLearn/videos/teaser.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:video:width" content="720">
    <meta property="og:video:height" content="1280">

    <!-- Twitter Card (aussi utilisé par certains autres réseaux) -->
    <meta name="twitter:card" content="player">
    <meta name="twitter:title" content="LovingLearn — Apprends en t'amusant 🚀">
    <meta name="twitter:image" content="https://gugu42.alwaysdata.net/LovingLearn/videos/poster.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --purple: #764ba2;
            --bg: #0f0f1a;
            --bg-2: #1a1040;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Nunito", sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        #stars-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite alternate;
            opacity: 0.7;
        }

        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.3); }
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-family: "Fredoka", sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #ffffff, #c7c3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .tagline {
            color: rgba(255,255,255,0.65);
            font-size: 1rem;
            margin-bottom: 28px;
        }

        .video-wrapper {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(79, 70, 229, 0.35), 0 0 0 1px rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
        }

        video {
            display: block;
            width: 100%;
            aspect-ratio: 9 / 16;
            background: #000;
        }

        .cta {
            margin-top: 28px;
            display: inline-block;
            padding: 14px 32px;
            background: var(--primary);
            border-bottom: 4px solid var(--primary-dark);
            border-radius: 16px;
            color: white;
            text-decoration: none;
            font-family: "Nunito", sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        .cta:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>

    <div id="stars-bg"></div>

    <div class="content">
        <div class="logo">🚀 LovingLearn</div>
        <p class="tagline">Découvre en vidéo la plateforme éducative</p>

        <div class="video-wrapper">
            <video controls playsinline preload="metadata" poster="videos/poster.jpg">
                <source src="videos/teaser.mp4" type="video/mp4">
                Ton navigateur ne supporte pas la lecture vidéo.
            </video>
        </div>

        <a href="/LovingLearn/" class="cta">Découvrir le site 🌟</a>

        <p class="footer-note">Projet de formation CFITECH — 2026</p>
    </div>

    <script>
        // Génération des étoiles scintillantes, comme sur le site principal
        const starsContainer = document.getElementById('stars-bg');
        const starCount = 60;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>

</body>
</html>
